<div class="container">

    <button
        class="theme-btn"
        [class.dark-active]="dark"
        (click)="toggleTheme()"
        aria-label="Cambiar tema">

        <span class="theme-icon sun-icon">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M428-804v-136h106v136H428Zm0 784v-136h106v136H428Zm376-408v-106h136v106H804Zm-784 0v-106h136v106H20Zm742-260-76-76 82-82 76 76-82 82ZM192-114l-76-76 82-82 76 76-82 82Zm576 0-82-82 76-76 82 82-76 76ZM196-688l-80-80 76-76 80 80-76 76Zm93 399q-79-79-79-191t79-191q79-79 191-79t191 79q79 79 79 191t-79 191q-79 79-191 79t-191-79Zm307.5-74.5Q644-411 644-480t-47.5-116.5Q549-644 480-644t-116.5 47.5Q316-549 316-480t47.5 116.5Q411-316 480-316t116.5-47.5ZM480-480Z"/></svg>
        </span>

        <span class="theme-icon moon-icon">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M484-67q-86 0-162.03-33.1-76.02-33.1-132.4-89.47-56.37-56.38-89.47-132.4Q67-398 67-484q0-155 100-271.5T421-896q-14 100 11.5 197T530-530q72 72 169 97.5t197 8.5q-23 155-140 256T484-67Zm0-106q79 0 147.5-37.5T743-314q-82-11-155.5-47T455-456q-59-59-95.5-132.5T313-744q-66 43-103 112t-37 148q0 129.58 90.71 220.29Q354.42-173 484-173Zm-29-283Z"/></svg>
        </span>

    </button>

    <div class="card">

        <div class="login-logo">

            <img
                class="logo-light"
                src="/logo-light.png"
                alt="Logo Biblioteca">

            <img
                class="logo-dark"
                src="/logo-dark.png"
                alt="Logo Biblioteca">

        </div>

        <h1>UNIST-K</h1>

        <p>
            Sistema de Gestión Bibliotecaria | UNISTMO
        </p>

        <div class="roles">

            <button
                [class.active]="role === 'alumno'"
                (click)="role = 'alumno'">
                Alumno
            </button>

            <button
                [class.active]="role === 'profesor'"
                (click)="role = 'profesor'">
                Profesor
            </button>

            <button
                [class.active]="role === 'bibliotecario'"
                (click)="role = 'bibliotecario'">
                Bibliotecario
            </button>

        </div>

        <label>
            {{ role === 'alumno' ? 'Matrícula' : 'Número de Control' }}
        </label>

        <input
            type="text"
            [(ngModel)]="matricula"
            [placeholder]="
                role === 'alumno'
                ? 'Ingrese su matrícula'
                : 'Ingrese su número de control'
            ">

        <label>Contraseña</label>

        <input
            type="password"
            [(ngModel)]="password"
            placeholder="Ingrese su contraseña">

        <button
            class="login-btn"
            (click)="login()">
            Iniciar Sesión
        </button>

        <p
            class="help-text"
            *ngIf="role !== 'bibliotecario'">
            Si tienes problemas para acceder, consulta con el bibliotecario.
        </p>

    </div>

</div>
