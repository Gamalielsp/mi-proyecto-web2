<div class="container">

    <button
        class="theme-btn"
        [class.dark-active]="dark"
        (click)="toggleTheme()"
        aria-label="Cambiar tema">

        <span class="theme-icon sun-icon">
            ☀
        </span>

        <span class="theme-icon moon-icon">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M560-80q-82 0-155-31.5t-127.5-86Q223-252 191.5-325T160-480.5q0-82.5 31.5-155t86-127Q332-817 405-848.5T560-880q54 0 105 14t95 40q-91 53-145.5 143.5T560-480q0 112 54.5 202.5T760-134q-44 26-95 40T560-80Zm0-80h21q10 0 19-2-57-66-88.5-147.5T480-480q0-89 31.5-170.5T600-798q-9-2-19-2h-21q-133 0-226.5 93.5T240-480q0 133 93.5 226.5T560-160Zm-80-320Z"/></svg>
        </span>

    </button>

    <div class="card">

        <div class="login-logo">

            <img
                class="logo-light"
                src="/logo-light.png"
                alt="Logo Biblioteca">

            <img
                class="logo-dark"
                src="/logo-dark.png"
                alt="Logo Biblioteca">

        </div>

        <h1>UNIST-K</h1>

        <p>
            Sistema de Gestión Bibliotecaria | UNISTMO
        </p>

        <div class="roles">

            <button
                [class.active]="role === 'alumno'"
                (click)="role = 'alumno'">
                Alumno
            </button>

            <button
                [class.active]="role === 'profesor'"
                (click)="role = 'profesor'">
                Profesor
            </button>

            <button
                [class.active]="role === 'bibliotecario'"
                (click)="role = 'bibliotecario'">
                Bibliotecario
            </button>

        </div>

        <label>
            {{ role === 'alumno' ? 'Matrícula' : 'Número de Control' }}
        </label>

        <input
            type="text"
            [(ngModel)]="matricula"
            [placeholder]="
                role === 'alumno'
                ? 'Ingrese su matrícula'
                : 'Ingrese su número de control'
            ">

        <label>Contraseña</label>

        <input
            type="password"
            [(ngModel)]="password"
            placeholder="Ingrese su contraseña">

        <button
            class="login-btn"
            (click)="login()">
            Iniciar Sesión
        </button>

        <p
            class="help-text"
            *ngIf="role !== 'bibliotecario'">
            Si tienes problemas para acceder, consulta con el bibliotecario.
        </p>

    </div>

</div>
