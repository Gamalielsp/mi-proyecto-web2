<div
  class="popup-backdrop"
  *ngIf="open">

  <div class="popup-card">

    <h2>Reserva Confirmada</h2>

    <h3>{{ folio }}</h3>

    <div *ngIf="book">

      <h4>{{ book.title }}</h4>

      <p>{{ book.author }}</p>

    </div>

    <p>
    Tiempo restante:
    {{ minutes }}:{{ formattedSeconds }}
    </p>

    <button
      type="button"
      (click)="closePopup()">

      Entendido

    </button>

  </div>

</div>
